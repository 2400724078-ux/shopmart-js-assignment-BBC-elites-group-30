<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopMart – Checkout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Shop<span>Mart</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cart.html" id="cart-count" class="cart-btn">Cart (0)</a>
      </div>
    </div>
  </nav>

  <!-- ===== PAGE HEADER ===== -->
  <div class="page-header">
    <h1>Checkout</h1>
    <p>Fill in your details to complete your order</p>
  </div>

  <!-- ===== CHECKOUT CONTAINER ===== -->
  <div class="checkout-container">

    <div class="checkout-form">

      <!-- Order Summary Box — built dynamically by JavaScript -->
      <div class="order-summary-box">
        <h3>📦 Order Summary</h3>
        <div id="order-items">
          <!-- JS will inject order items here -->
        </div>
        <div class="order-total">
          <span>Total (incl. shipping)</span>
          <span id="order-total-amount">$0</span>
        </div>
      </div>

      <!-- Checkout Form — validated by JavaScript -->
      <form id="checkout-form" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="checkout-name">Full Name</label>
          <input
            type="text"
            id="checkout-name"
            placeholder="e.g. John Doe"
          />
          <p class="error-msg" id="name-error"></p>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="checkout-email">Email Address</label>
          <input
            type="email"
            id="checkout-email"
            placeholder="e.g. john@email.com"
          />
          <p class="error-msg" id="email-error"></p>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label for="checkout-phone">Phone Number</label>
          <input
            type="tel"
            id="checkout-phone"
            placeholder="e.g. +256 700 000000"
          />
          <p class="error-msg" id="phone-error"></p>
        </div>

        <!-- Delivery Address -->
        <div class="form-group">
          <label for="checkout-address">Delivery Address</label>
          <input
            type="text"
            id="checkout-address"
            placeholder="e.g. 123 Kampala Road, Uganda"
          />
          <p class="error-msg" id="address-error"></p>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">Place Order 🎉</button>

      </form>
    </div>
  </div>

  <!-- ===== SUCCESS MODAL ===== -->
  <!-- Shown by JavaScript after successful checkout -->
  <div class="modal-overlay" id="success-modal">
    <div class="modal">
      <div class="modal-icon">🎉</div>
      <h2>Order Placed!</h2>
      <p>Thank you for your purchase. Your order is on its way!</p>
      <a href="index.html">Continue Shopping</a>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>© 2025 <span>ShopMart</span>. Built with HTML, CSS & Vanilla JavaScript.</p>
  </footer>

  <!-- Load the main JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
